<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Golf Paper Craft — Asset Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  /* === Golf Paper Craft palette ===
     paper-cream #FBF5E0  page-cream #F5EDD8  warm-tan #E8D5A8
     grass-light #C6E45C  grass #9DCB55  grass-dark #7AAA38
     earth-light #B07A48  earth #8B5847  earth-dark #5A3C1E
     sky #6FB8DC  ink #2B1D12  flag-orange #E8A040  pink #F7C8DD
  */
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Fredoka', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #2B1D12;
    background: #F5EDD8;
    background-image:
      radial-gradient(circle at 12% 18%, rgba(157, 203, 85, 0.10) 0%, transparent 28%),
      radial-gradient(circle at 88% 82%, rgba(111, 184, 220, 0.10) 0%, transparent 30%),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='40'><circle cx='4' cy='6' r='0.6' fill='%23B07A48' opacity='0.18'/><circle cx='22' cy='14' r='0.5' fill='%238B5847' opacity='0.15'/><circle cx='34' cy='28' r='0.6' fill='%237AAA38' opacity='0.16'/><circle cx='12' cy='32' r='0.5' fill='%23B07A48' opacity='0.14'/></svg>");
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 100;
    background: linear-gradient(180deg, #FBF5E0 0%, #F0E4C0 100%);
    padding: 16px 24px;
    border-bottom: 3px solid #5A3C1E;
    box-shadow: 0 4px 0 rgba(43, 29, 18, 0.06);
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
  }
  h1 {
    margin: 0; font-size: 26px; font-weight: 800; color: #5A3C1E;
    letter-spacing: -0.01em;
    text-shadow: 1.5px 1.5px 0 rgba(255,255,255,0.7), 2px 2px 0 rgba(43,29,18,0.08);
  }
  h1::before { content: '⛳ '; font-size: 22px; }
  .meta { color: #8B5847; font-size: 13px; font-weight: 500; }
  .controls { flex: 1; display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-end; }
  input, select {
    background: #FFF9E8; color: #2B1D12; font-family: inherit;
    border: 2px solid #B07A48; padding: 8px 12px; border-radius: 10px;
    font-size: 14px; font-weight: 500; transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus { outline: none; border-color: #5A3C1E; box-shadow: 0 0 0 3px rgba(232,160,64,0.25); }
  input { min-width: 220px; }
  .chips {
    position: sticky; top: 70px; z-index: 90;
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 12px 24px; background: #FBF5E0;
    border-bottom: 2px dashed rgba(139,88,71,0.3);
  }
  .chip {
    padding: 6px 14px; border-radius: 999px;
    background: #FFF9E8; border: 1.5px solid #B07A48;
    cursor: pointer; font-size: 12px; font-weight: 600; color: #5A3C1E;
    user-select: none; transition: all .15s;
  }
  .chip:hover { border-color: #5A3C1E; transform: translateY(-1px); }
  .chip.active {
    background: linear-gradient(180deg, #C6E45C 0%, #9DCB55 100%);
    color: #2B1D12; border-color: #5A3C1E;
    box-shadow: 0 2px 0 #5A3C1E;
  }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px; padding: 18px 24px;
  }
  .card {
    background: #FFF9E8;
    border: 2px solid #5A3C1E;
    border-radius: 12px;
    overflow: hidden; cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    display: flex; flex-direction: column;
    box-shadow: 0 3px 0 rgba(43,29,18,0.18), 0 0 0 1px rgba(255,255,255,0.6) inset;
    position: relative; z-index: 0;
  }
  .card:hover {
    transform: translateY(-3px) rotate(-0.4deg);
    box-shadow: 0 6px 0 rgba(43,29,18,0.22), 0 0 0 1px rgba(255,255,255,0.6) inset;
  }
  .thumb {
    aspect-ratio: 1;
    background:
      linear-gradient(135deg, #DDF0FF 0%, #B8E0F2 50%, #C6E45C 50%, #9DCB55 100%);
    display: flex; align-items: center; justify-content: center;
    padding: 10px;
    position: relative;
    border-bottom: 2px solid #5A3C1E;
  }
  .thumb::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 30% 25%, rgba(255,255,255,0.4) 0%, transparent 55%);
  }
  .thumb img { max-width: 100%; max-height: 100%; object-fit: contain; image-rendering: -webkit-optimize-contrast; position: relative; z-index: 1; }
  .anim-frame {
    width: 128px; height: 128px; background-repeat: no-repeat; background-size: auto 100%;
    image-rendering: -webkit-optimize-contrast;
  }
  @keyframes sprite-play { to { background-position-x: var(--end); } }
  .info { padding: 10px 12px; font-size: 12px; background: #FFF9E8; }
  .info .n { color: #2B1D12; font-weight: 700; word-break: break-word; line-height: 1.25; }
  .info .d { color: #8B5847; font-size: 10px; margin-top: 4px; display: flex; justify-content: space-between; font-weight: 500; }
  .tag {
    display: inline-block; font-size: 9px; padding: 2px 8px; border-radius: 999px;
    background: #E8D5A8; color: #5A3C1E; margin-top: 4px; font-weight: 600;
    border: 1px solid #B07A48;
  }
  .edit-btn {
    position: absolute; top: 6px; right: 6px;
    background: rgba(255, 249, 232, 0.9);
    border: 1px solid #5A3C1E; border-radius: 6px;
    padding: 3px 6px; font-size: 11px; cursor: pointer; z-index: 10;
    font-weight: 700; color: #5A3C1E; display: block; box-shadow: 0 1px 0 rgba(43,29,18,0.2);
  }
  .edit-btn:hover { background: #E8D5A8; }
  .dl {
    display: block; margin-top: 10px; text-align: center;
    background: linear-gradient(180deg, #E8A040 0%, #D08020 100%);
    color: #FFF9E8; text-decoration: none; padding: 7px;
    border-radius: 8px; font-size: 11px; font-weight: 700;
    border: 1.5px solid #5A3C1E; box-shadow: 0 2px 0 #5A3C1E;
    transition: transform .1s;
  }
  .dl:hover { transform: translateY(-1px); }
  .dl:active { transform: translateY(1px); box-shadow: 0 0 0 #5A3C1E; }
  .modal .dl { margin-top: 12px; padding: 11px; font-size: 13px; }
  /* modal — z-index 500 floats above sticky header (z:100) */
  .modal {
    position: fixed; inset: 0; background: rgba(43, 29, 18, 0.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center; z-index: 500; padding: 24px;
  }
  .modal.open { display: flex; }
  /* Editor modal */
  #editor-modal {
    background: rgba(0,0,0,0.85); padding: 0; z-index: 1000;
    width: 100vw; height: 100vh;
  }
  #editor-modal.open { display: flex; }
  .editor-host {
    width: 95vw; height: 95vh;
    background: #1a1d24;
    border: 2px solid #5A3C1E; border-radius: 12px;
    overflow: hidden; display: flex;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
  }
  .editor-host > .gpc-ie-root { flex: 1; min-height: 0; }
  /* Detail modal box: preview | scrollable details side-by-side */
  .modal .box {
    background: #FBF5E0;
    border: 3px solid #5A3C1E; border-radius: 16px;
    width: min(92vw, 960px); max-height: 90vh;
    overflow: hidden;
    display: grid; grid-template-columns: 1fr 340px;
    box-shadow: 0 8px 0 rgba(43,29,18,0.25);
    position: relative;
  }
  .modal .preview {
    background: linear-gradient(135deg, #DDF0FF 0%, #B8E0F2 50%, #C6E45C 50%, #9DCB55 100%);
    border-radius: 13px 0 0 13px; border-right: 3px solid #5A3C1E;
    display: flex; align-items: center; justify-content: center; padding: 22px;
    min-height: 320px; overflow: hidden;
  }
  .modal .preview img { max-width: 100%; max-height: 60vh; object-fit: contain; }
  /* Right details panel: scrollable with custom scrollbar */
  .modal .details {
    display: flex; flex-direction: column;
    overflow-y: auto; max-height: 90vh; padding: 0;
    scrollbar-width: thin; scrollbar-color: #B07A48 #F0E4C0;
  }
  .modal .details::-webkit-scrollbar { width: 7px; }
  .modal .details::-webkit-scrollbar-track { background: #F0E4C0; border-radius: 0 13px 13px 0; }
  .modal .details::-webkit-scrollbar-thumb { background: #B07A48; border-radius: 4px; }
  .modal .details::-webkit-scrollbar-thumb:hover { background: #5A3C1E; }
  /* Sticky name header at top of details panel */
  .modal .details-header {
    position: sticky; top: 0; z-index: 10;
    background: #FBF5E0; border-bottom: 2px solid #5A3C1E;
    padding: 14px 44px 12px 16px;
  }
  .modal .details-header h2 {
    margin: 0; color: #5A3C1E; font-size: 15px; font-weight: 800;
    word-break: break-word; line-height: 1.3;
  }
  /* X button anchored to .box (position:relative) top-right corner */
  .modal .close {
    position: absolute; top: 10px; right: 10px; font-size: 22px;
    color: #5A3C1E; cursor: pointer; background: none; border: none;
    line-height: 1; font-weight: 800; z-index: 20;
    width: 30px; height: 30px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; transition: background .12s;
  }
  .modal .close:hover { background: rgba(90,60,30,0.12); }
  /* Sticky badges row */
  .modal .d-badges {
    display: flex; flex-wrap: wrap; gap: 5px; padding: 8px 16px 10px;
    border-bottom: 1px dashed rgba(139,88,71,0.3);
    background: #FBF5E0; position: sticky; top: 56px; z-index: 9;
  }
  .modal .d-badge {
    font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 999px;
    border: 1.5px solid #5A3C1E; background: #E8D5A8; color: #5A3C1E;
  }
  .modal .d-badge.anim { background: #6FB8DC; color: #1a1510; border-color: #3a8ab0; }
  .modal .d-badge.course { background: #9DCB55; color: #1a2208; border-color: #5A8020; }
  .modal .d-badge.sheet { background: linear-gradient(180deg,#E8A040 0%,#D08020 100%); color: #1a1510; border-color: #5A3C1E; }
  .modal .d-badge.review { background: #E87878; color: #fff; border-color: #9a2626; }
  /* Sections inside details */
  .modal .d-section { padding: 12px 16px; border-bottom: 1px dashed rgba(139,88,71,0.3); }
  .modal .d-section:last-child { border-bottom: none; }
  .modal .d-section-title {
    font-size: 10px; font-weight: 800; color: #8B5847;
    letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
  }
  .modal .details .row {
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 5px 0; gap: 8px; border-bottom: 1px dashed rgba(139,88,71,0.18);
  }
  .modal .details .row:last-child { border-bottom: none; }
  .modal .details .row .k { color: #8B5847; font-weight: 600; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .modal .details .row .v { color: #2B1D12; font-size: 12px; text-align: right; word-break: break-word; }
  /* Action buttons */
  .modal .d-actions { display: flex; flex-direction: column; gap: 8px; padding: 12px 16px; }
  .modal .d-action-btn {
    width: 100%; padding: 9px 12px; border-radius: 8px;
    border: 2px solid #5A3C1E; font-family: inherit; font-size: 12px;
    font-weight: 700; cursor: pointer; text-align: center; transition: transform .1s;
    text-decoration: none; display: block; box-sizing: border-box;
  }
  .modal .d-action-btn:hover { transform: translateY(-1px); }
  .modal .d-action-btn:active { transform: translateY(1px); }
  .modal .d-action-btn.primary { background: linear-gradient(180deg,#E8A040 0%,#D08020 100%); color: #1a1510; box-shadow: 0 2px 0 #5A3C1E; }
  .modal .d-action-btn.edit { background: linear-gradient(180deg,#C6E45C 0%,#9DCB55 100%); color: #1a2208; box-shadow: 0 2px 0 #5A3C1E; }
  .modal .d-action-btn.danger { background: linear-gradient(180deg,#E87878 0%,#C04040 100%); color: #FFF9E8; box-shadow: 0 2px 0 #5A3C1E; }
  .modal .d-action-btn.secondary { background: #FFF9E8; color: #5A3C1E; }
  .empty { text-align: center; padding: 60px; color: #8B5847; font-size: 15px; font-weight: 500; }
  /* confirm dialog */
  #confirm-overlay {
    position: fixed; inset: 0; background: rgba(43,29,18,0.55);
    backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center; z-index: 999;
  }
  #confirm-overlay.open { display: flex; }
  #confirm-box {
    background: #FBF5E0; border: 3px solid #5A3C1E; border-radius: 16px;
    padding: 28px 32px; max-width: 380px; width: 90vw; text-align: center;
    box-shadow: 0 8px 0 rgba(43,29,18,0.25);
  }
  #confirm-box p { margin: 0 0 22px; font-size: 15px; color: #3A1E0A; font-weight: 600; line-height: 1.5; word-break: break-all; }
  #confirm-box .row { display: flex; gap: 12px; justify-content: center; }
  #confirm-box button { flex: 1; padding: 10px; border-radius: 10px; border: 2px solid #5A3C1E; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  #confirm-yes { background: #7a2020; color: #fff; }
  #confirm-yes:hover { background: #9a2626; }
  #confirm-no  { background: #FBF5E0; color: #5A3C1E; }
  #confirm-no:hover { background: #ede5cc; }
  .tab {
    background: #FFF9E8; border: 1.5px solid #B07A48; color: #5A3C1E;
    padding: 8px 16px; border-radius: 10px; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
  }
  .tab:hover { border-color: #5A3C1E; transform: translateY(-1px); }
  .tab.active {
    background: linear-gradient(180deg, #E8A040 0%, #D08020 100%);
    color: #FFF9E8; border-color: #5A3C1E;
    box-shadow: 0 2px 0 #5A3C1E;
  }
  .miss { background:#FFF9E8; border:2px solid #5A3C1E; border-radius:12px; padding:14px; box-shadow: 0 3px 0 rgba(43,29,18,0.18); }
  .miss h3 { margin:0 0 8px; color:#2B1D12; font-size:14px; font-weight:700; }
  .miss .meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px; }
  .miss .notes { font-size:12px; color:#5A3C1E; line-height:1.5; margin-bottom:8px; }
  .miss .prompt { font-size:11px; color:#5A3C1E; background:#F0E4C0; border:1px dashed #B07A48; border-radius:6px; padding:8px; max-height:80px; overflow:auto; font-family:ui-monospace,Menlo,monospace; white-space:pre-wrap; margin-bottom:8px; }
  .miss .actions { display:flex; gap:6px; flex-wrap:wrap; }
  .miss .btn {
    flex:1; min-width:100px; padding:8px 10px; border-radius:8px;
    border:1.5px solid #5A3C1E; background:#FFF9E8; color:#2B1D12;
    font-family: inherit; font-size:11px; font-weight:700; cursor:pointer;
    text-align:center; transition: transform .1s;
  }
  .miss .btn:hover { transform: translateY(-1px); }
  .miss .btn.primary { background: linear-gradient(180deg, #C6E45C 0%, #9DCB55 100%); color:#2B1D12; box-shadow: 0 2px 0 #5A3C1E; }
  .miss .btn.danger { background: linear-gradient(180deg, #E87878 0%, #C04040 100%); color:#FFF9E8; border-color:#5A3C1E; box-shadow: 0 2px 0 #5A3C1E; }
  .miss .preview { margin:8px 0; padding:10px; background: linear-gradient(135deg, #DDF0FF 0%, #C6E45C 100%); border:2px solid #5A3C1E; border-radius:8px; display:flex; align-items:center; gap:8px; }
  .miss .preview img { max-height:64px; max-width:128px; }
  .up-preview {
    margin:10px 0; padding:14px;
    background: linear-gradient(135deg, #DDF0FF 0%, #B8E0F2 50%, #C6E45C 50%, #9DCB55 100%);
    border:2px solid #5A3C1E; border-radius:10px; text-align:center;
  }
  .up-preview img { max-width:100%; max-height:280px; object-fit:contain; cursor:zoom-in; }
  .up-info { margin-top:8px; }
  .up-name { font-size:12px; color:#2B1D12; word-break:break-all; font-weight:700; }
  .up-meta { font-size:11px; color:#8B5847; margin-top:2px; font-weight:500; }
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:#FBF5E0; color:#2B1D12; padding:10px 20px;
    border-radius:999px; border:2px solid #5A3C1E;
    box-shadow: 0 4px 0 rgba(43,29,18,0.2);
    z-index:2000; font-size:13px; font-weight:600; opacity:0; transition:opacity .2s;
  }
  .toast.show { opacity:1; }
  .pri-P0 { background:#C04040; color:#FFF9E8; }
  .pri-P1 { background:#E8A040; color:#2B1D12; }
  .pri-P2 { background:#E8D5A8; color:#5A3C1E; }
  .st-todo { background:#E8D5A8; color:#5A3C1E; }
  .st-in-progress { background:#6FB8DC; color:#FFF9E8; }
  .st-waiting-for-review { background:#E8A040; color:#2B1D12; }
  .st-denied { background:#C04040; color:#FFF9E8; }
  .st-approved, .st-done { background:#9DCB55; color:#2B1D12; }
  .st-blocked { background:#8B5847; color:#FFF9E8; }
  .deny-reason { margin:8px 0; padding:10px; background:#FCE0E0; border-left:4px solid #C04040; color:#5A1818; font-size:12px; border-radius:6px; font-weight:500; }
  .sheet-card .thumb {
    background: linear-gradient(135deg, #1a1d24 0%, #2d3040 100%);
    border-bottom-color: #E8A040;
  }
  .sheet-badge {
    position: absolute; top: 6px; left: 6px;
    background: linear-gradient(180deg, #E8A040 0%, #D08020 100%);
    color: #1a1510; font-size: 9px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; border: 1px solid #5A3C1E;
    z-index: 10;

    display: grid; grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));

    aspect-ratio: 1; background: linear-gradient(135deg, #DDF0FF 0%, #C6E45C 100%);

  .sliced-thumb:hover { transform: scale(1.08); border-color: #5A3C1E; }
  .sliced-thumb img { max-width: 100%; max-height: 100%; object-fit: contain; }
</style>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

// Public Firestore config — read-only by security rules, safe to expose.
const fbApp = initializeApp({
  apiKey: 'AIzaSyCmyZzmRd1XhSxz_bArNcGHiJPTMCrtfwM',
  authDomain: 'vocab-418e1.firebaseapp.com',
  projectId: 'vocab-418e1',
  storageBucket: 'vocab-418e1.firebasestorage.app',
  messagingSenderId: '387847607962',
  appId: '1:387847607962:web:95f7ec61d9cf14f07c7123',
}, 'asset-browser-client');
const fbDb = getFirestore(fbApp);

// Expose to global scope so the inline <script> block can access it.
window._fbManifestOverrides = {};
window._fbAnimMetaOverrides = {};

onSnapshot(doc(fbDb, 'golf-paper-craft', 'manifest'), snap => {
  if (!snap.exists()) return;
  const d = snap.data();
  window._fbManifestOverrides = d.assets || {};
  // Refresh thumbnails that have been updated in Firebase Storage
  document.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    const entry = window._fbManifestOverrides[id];
    if (!entry || !entry.url) return;
    // Only update if not locally overridden (localOverrides wins)
    if (window.localOverrides?.has(id)) return;
    const img = card.querySelector('.thumb img');
    if (img && img.src !== entry.url) img.src = entry.url;
    const anim = card.querySelector('.anim-frame');
    if (anim) anim.style.backgroundImage = `url('${entry.url}')`;
  });
}, err => console.warn('[firebase] manifest listener error:', err));

onSnapshot(doc(fbDb, 'golf-paper-craft', 'animation-meta'), snap => {
  if (!snap.exists()) return;
  window._fbAnimMetaOverrides = snap.data() || {};
  // Patch local data.items animation field with latest from Firestore
  if (typeof data !== 'undefined' && data.items) {
    for (const item of data.items) {
      const fb = window._fbAnimMetaOverrides[item.id];
      if (fb) item.animation = { ...item.animation, ...fb };
    }
  }
}, err => console.warn('[firebase] animation-meta listener error:', err));
</script>

    <button class="tab" data-tab="denied">Reddedilen</button>
    <button class="tab" data-tab="review" id="review-tab" style="display:none;">İnceleme</button>
    <button class="tab" data-tab="trash" id="trash-tab" style="display:none;">Çöp</button>
  </div>
  <div class="controls">
    <button class="tab" id="upload-video-btn" title="Video → Animation Strip" style="background:linear-gradient(180deg,#E8A040 0%,#D08020 100%);color:#FFF9E8;border-color:#5A3C1E;box-shadow:0 2px 0 #5A3C1E;">🎬 Video → Strip</button>
    <input type="file" id="upload-video-input" accept="video/*" style="display:none;">
    <input id="q" placeholder="Ara (isim)…">
    <select id="type">
      <option value="">Tüm tipler</option>
      <option value="Resim">Resim</option>
      <option value="Animasyon">Animasyon</option>
    </select>
    <select id="cat">
      <option value="">Tüm kategoriler</option>
    </select>
    <select id="ext">
      <option value="">Tüm formatlar</option>
    </select>
  </div>
</header>
<div class="chips" id="chips"></div>
<div class="grid" id="grid"></div>
<div id="confirm-overlay" onclick="if(event.target===this)_confirmResolve(false)">
  <div id="confirm-box">
    <p id="confirm-msg"></p>
    <div class="row">
      <button id="confirm-yes" onclick="_confirmResolve(true)">Evet, Sil</button>
      <button id="confirm-no"  onclick="_confirmResolve(false)">Vazgeç</button>
    </div>
  </div>
</div>
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
  <button class="close" onclick="closeModal()">×</button>
  <div class="box" id="box"></div>
</div>
<div class="modal" id="editor-modal"></div>
<script>
let data = { items: [] };
let missing = { items: [] };
let review = { items: [] };
let config = null;
let sourceSheetOverrides = {};   // assetId -> { sourceSheet }
let sourceBboxStore = {};        // assetId -> { x, y, w, h }
let lastAction = null; // for undo

// Map<assetId, objectURL> — populated from IndexedDB on load, updated on publish
// Exposed on window so the ES-module Firebase script can access it (classic `const` is NOT on window).
const localOverrides = new Map();
window.localOverrides = localOverrides;
// Map<assetId, {blob, animMeta, edits, repoPath, objectURL}> — staged but not yet published
const stagedAssets = new Map();
window.stagedAssets = stagedAssets;

// --- IndexedDB helpers ---
function idbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open('gpc-asset-overrides', 2);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('overrides')) db.createObjectStore('overrides', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('staging')) db.createObjectStore('staging', { keyPath: 'id' });
    };
    req.onsuccess = e => res(e.target.result);
    req.onerror = e => rej(e.target.error);
  });
}
async function idbSaveOverride(assetId, blob, animMeta) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('overrides', 'readwrite');
      tx.objectStore('overrides').put({ id: assetId, blob, animMeta, ts: Date.now() });
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e.target.error);
    });
  } catch (e) { console.warn('idbSaveOverride failed', e); }
}
async function idbGetOverride(assetId) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const req = db.transaction('overrides').objectStore('overrides').get(assetId);
      req.onsuccess = e => res(e.target.result || null);
      req.onerror = e => rej(e.target.error);
    });
  } catch (e) { return null; }
}
async function idbClearOverride(assetId) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('overrides', 'readwrite');
      tx.objectStore('overrides').delete(assetId);
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e.target.error);
    });
  } catch (e) { console.warn('idbClearOverride failed', e); }
}
async function idbClearStaleOverrides(manifestItems) {
  try {
    const db = await idbOpen();
    const all = await new Promise((res, rej) => {
      const req = db.transaction('overrides').objectStore('overrides').getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e.target.error);
    });
    for (const entry of all) {
      const item = manifestItems.find(x => x.id === entry.id);
      if (item && new Date(item.mtime).getTime() > entry.ts) {
        await idbClearOverride(entry.id);
        const url = localOverrides.get(entry.id);
        if (url) { URL.revokeObjectURL(url); localOverrides.delete(entry.id); }
      }
    }
  } catch (e) { console.warn('idbClearStaleOverrides failed', e); }
}
async function idbRebuildLocalOverrides() {
  try {
    const db = await idbOpen();
    const all = await new Promise((res, rej) => {
      const req = db.transaction('overrides').objectStore('overrides').getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e.target.error);
    });
    for (const entry of all) {
      const prev = localOverrides.get(entry.id);
      if (prev) URL.revokeObjectURL(prev);
      localOverrides.set(entry.id, URL.createObjectURL(entry.blob));
    }
  } catch (e) { console.warn('idbRebuildLocalOverrides failed', e); }
}

// --- Staging helpers ---
async function idbSaveStaged(assetId, blob, animMeta, edits, repoPath) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('staging', 'readwrite');
      tx.objectStore('staging').put({ id: assetId, blob, animMeta, edits, repoPath, ts: Date.now() });
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e.target.error);
    });
  } catch (e) { console.warn('idbSaveStaged failed', e); }
}
async function idbGetAllStaged() {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const req = db.transaction('staging').objectStore('staging').getAll();
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e.target.error);
    });
  } catch (e) { return []; }
}
async function idbClearStaged(assetId) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('staging', 'readwrite');
      tx.objectStore('staging').delete(assetId);
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e.target.error);
    });
  } catch (e) { console.warn('idbClearStaged failed', e); }
}
async function idbClearAllStaged() {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction('staging', 'readwrite');
      tx.objectStore('staging').clear();
      tx.oncomplete = () => res();
      tx.onerror = e => rej(e.target.error);
    });
  } catch (e) { console.warn('idbClearAllStaged failed', e); }
}
async function rebuildStagedAssets() {
  const all = await idbGetAllStaged();
  for (const entry of all) {
    const prev = stagedAssets.get(entry.id);
    if (prev && prev.objectURL) URL.revokeObjectURL(prev.objectURL);
    const objectURL = URL.createObjectURL(entry.blob);
    stagedAssets.set(entry.id, { blob: entry.blob, animMeta: entry.animMeta, edits: entry.edits, repoPath: entry.repoPath, objectURL });
    // staged also wins over overrides in localOverrides
    const prevLO = localOverrides.get(entry.id);
    if (prevLO) URL.revokeObjectURL(prevLO);
    localOverrides.set(entry.id, objectURL);
  }
}

// --- URL state sync ---
function syncUrlParams() {
  const p = new URLSearchParams();
  if (filter.q) p.set('q', filter.q);
  if (filter.cat) p.set('cat', filter.cat);
  if (filter.ext) p.set('ext', filter.ext);
  if (filter.type) p.set('type', filter.type);
  if (filter.kind) p.set('kind', filter.kind);
  if (filter.sheetOnly) p.set('sheetOnly', '1');
  if (tab && tab !== 'have') p.set('tab', tab);
  // preserve ?asset= if modal is open
  const cur = new URLSearchParams(location.search);
  if (cur.get('asset')) p.set('asset', cur.get('asset'));
  const qs = p.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}
function restoreStateFromUrl() {
  const p = new URLSearchParams(location.search);
  if (p.get('q')) { filter.q = decodeURIComponent(p.get('q')); document.getElementById('q').value = filter.q; }
  if (p.get('cat')) { filter.cat = p.get('cat'); document.getElementById('cat').value = filter.cat; }
  if (p.get('ext')) { filter.ext = p.get('ext'); document.getElementById('ext').value = filter.ext; }
  if (p.get('type')) { filter.type = p.get('type'); document.getElementById('type').value = filter.type; }
  if (p.get('kind')) { filter.kind = p.get('kind'); }
  if (p.get('sheetOnly')) { filter.sheetOnly = true; }
  if (p.get('tab') && p.get('tab') !== 'have') {
    const btn = document.querySelector(`.tab[data-tab="${p.get('tab')}"]`);
    if (btn) btn.click();
  }
}

function sourceDirFor(item) {
  if (!config) return '';
  // review tab items carry sourceDir directly
  const flagDir = item._flag?.sourceDir || item.sourceDir;
  if (flagDir) return flagDir;
  const src = item.src || '';
  const tag = src.split('/')[2];
  const s = (config.sources || []).find(x => x.tag === tag);
  return s ? s.dir : '';
}
let tab = 'have';
let filter = { q: '', cat: '', ext: '', kind: '', type: '', sheetOnly: false };

async function load() {
  const [r, m, c, rv, sso, sbb] = await Promise.all([
    fetch('./manifest.json?' + Date.now()).then(x => x.json()),
    fetch('/api/missing?' + Date.now()).then(x => x.ok ? x.json() : Promise.reject()).catch(() => fetch('./missing.json').then(x => x.json())).catch(() => ({ items: [] })),
    fetch('./config.json').then(x => x.json()).catch(() => null),
    fetch('/api/review-flag?' + Date.now()).then(x => x.ok ? x.json() : Promise.reject()).catch(() => fetch('./review.json').then(x => x.json())).catch(() => ({ items: [] })),
    fetch('./source-sheet-overrides.json').then(x => x.json()).catch(() => ({})),
    fetch('./source-bbox.json').then(x => x.json()).catch(() => ({})),
  ]);
  data = r; missing = m; config = c; review = rv;
  sourceSheetOverrides = sso || {};
  sourceBboxStore = sbb || {};
  // Wire Vercel deploy hook if present in config
  if (config?.vercelDeployHook) window._DEPLOY_HOOK_URL = config.vercelDeployHook;
  // Rebuild local overrides map from IndexedDB, then clear stale entries
  await idbRebuildLocalOverrides();
  await rebuildStagedAssets();
  await idbClearStaleOverrides(data.items || []);
  updateTabVisibility();
  // probe trash count (public endpoint)
  refreshTrashTabCount();
  buildCatSelect();
  // Restore filter + tab state from URL params BEFORE first render so chips activate correctly
  restoreStateFromUrl();
  updateMeta();
  buildChips();
  render();
  // Deep-link: ?edit=<id> opens that asset's editor modal on load.
  try {
    const params = new URLSearchParams(location.search);
    const editId = params.get('edit');
    if (editId) {
      const found = (data.items || []).find(x => x.id === editId || x.canonicalId === editId || x.file === editId);
      if (found) openEditor(found.id);
      else console.warn('[asset-browser] ?edit=' + editId + ' not found in manifest');
    }
  } catch (e) { console.warn('[asset-browser] edit deep-link failed:', e && e.message); }

  // Restore open modal from URL (already restored filter above)

  // Restore open modal from ?asset= param
  try {
    const _p2 = new URLSearchParams(location.search);
    const assetId = _p2.get('asset');
    if (assetId) {
      const found = (data.items || []).find(x => x.id === assetId);
      if (found) setTimeout(() => openModal(found.id), 100);
    }
  } catch (e) { console.warn('[asset-browser] asset deep-link failed:', e && e.message); }
}

const STATUS_FOR_TAB = {
  todo: s => s === 'todo' || s === 'in-progress',
  waiting: s => s === 'waiting-for-review',
  approved: s => s === 'approved',
  denied: s => s === 'denied',
};

function itemsForTab() {
  if (tab === 'have') return data.items;
  if (tab === 'review') {
    // Resolve flagged files to manifest items so we get full thumb/dim info
    const map = new Map(data.items.map(i => [i.file, i]));
    return review.items.map(r => {
      const m = map.get(r.file);
      return m ? { ...m, _flag: r } : { id: 'flag-' + r.file, file: r.file, name: r.file, src: '', dim: '?', size: 0, kind: '—', type: '—', _flag: r, _missing: true };
    });
  }
  const fn = STATUS_FOR_TAB[tab];
  return missing.items.filter(i => fn(i.status));
}

function updateTabVisibility() {
  for (const k of ['waiting', 'approved', 'denied']) {
    const count = missing.items.filter(i => STATUS_FOR_TAB[k](i.status)).length;
    const btn = document.querySelector(`.tab[data-tab="${k}"]`);
    if (btn) btn.style.display = count ? '' : 'none';
  }
  const reviewBtn = document.getElementById('review-tab');
  if (reviewBtn) reviewBtn.style.display = (review.items.length || tab === 'review') ? '' : 'none';
  // If current tab just got hidden, fall back to Mevcut
  const activeBtn = document.querySelector('.tab.active');
  if (activeBtn && activeBtn.style.display === 'none') {
    document.querySelector('.tab[data-tab="have"]').click();
  }
}

function updateMeta() {
  const el = document.getElementById('meta');
  if (tab === 'have') el.textContent = `${data.count} asset · updated ${new Date(data.generated).toLocaleString()}`;
  else if (tab === 'review') el.textContent = `${review.items.length} inceleme bekliyor · updated ${review.updated || '—'}`;
  else {
    const count = itemsForTab().length;
    const label = { todo: 'eksik', waiting: 'bekleyen', approved: 'onaylı', denied: 'reddedilen' }[tab];
    el.textContent = `${count} ${label} · updated ${missing.updated || '—'}`;
  }
}

function buildCatSelect() {
  fillSelect('cat', [...new Set(data.items.map(i => i.category))].sort());
  fillSelect('ext', [...new Set(data.items.map(i => i.ext))].sort().map(e => e.toUpperCase()));
}
function fillSelect(id, values) {
  const sel = document.getElementById(id);
  values.forEach(v => {
    if ([...sel.options].some(o => o.value.toLowerCase() === String(v).toLowerCase())) return;
    const o = document.createElement('option');
    o.value = id === 'ext' ? String(v).toLowerCase() : v;
    o.textContent = v;
    sel.appendChild(o);
  });
}

function buildChips() {
  const src = (tab === 'review') ? itemsForTab() : data.items;
  const nonSheet = src.filter(i => !i.isSheet);
  const sheetCount = src.filter(i => i.isSheet).length;
  const kinds = [...new Set(nonSheet.map(i => i.kind))].sort();
  const c = document.getElementById('chips');
  c.innerHTML = '';
  const all = chip('Tümü (' + nonSheet.length + ')', '');
  all.onclick = () => { filter.kind = ''; filter.sheetOnly = false; activateChip(all); syncUrlParams(); render(); };
  c.appendChild(all);
  kinds.forEach(k => {
    const cnt = nonSheet.filter(i => i.kind === k).length;
    const ch = chip(k + ' (' + cnt + ')', k);
    ch.onclick = () => { filter.kind = k; filter.sheetOnly = false; activateChip(ch); syncUrlParams(); render(); };
    c.appendChild(ch);
  });
  if (sheetCount > 0) {
    const sheetChip = chip('Sprite Sheet (' + sheetCount + ')', 'sheet');
    sheetChip.onclick = () => { filter.kind = ''; filter.sheetOnly = true; activateChip(sheetChip); syncUrlParams(); render(); };
    c.appendChild(sheetChip);
  }
  // Restore active chip from current filter state
  if (filter.sheetOnly) {
    const sc = [...c.querySelectorAll('.chip')].find(ch => ch.dataset.v === 'sheet');
    if (sc) activateChip(sc); else activateChip(c.querySelector('.chip'));
  } else if (filter.kind) {
    const kc = [...c.querySelectorAll('.chip')].find(ch => ch.dataset.v === filter.kind);
    if (kc) activateChip(kc); else activateChip(c.querySelector('.chip'));
  } else {
    activateChip(c.querySelector('.chip'));
  }
}

function chip(label, value) {
  const e = document.createElement('div');
  e.className = 'chip'; e.textContent = label; e.dataset.v = value;
  return e;
}

function activateChip(el) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
}

function render() {
  const g = document.getElementById('grid');
  const q = filter.q.toLowerCase();
  if (tab !== 'have' && tab !== 'review') {
    const src = itemsForTab();
    const filtered = src.filter(i =>
      (!q || i.name.toLowerCase().includes(q)) &&
      (!filter.kind || i.kind === filter.kind) &&
      (!filter.type || i.type === filter.type)
    );
    if (!filtered.length) { g.innerHTML = `<div class="empty">Liste boş.</div>`; return; }
    g.innerHTML = filtered.map(i => {
      const preview = i.uploadedFile
        ? `<div class="up-preview"><img src="/api/uploaded?file=${encodeURIComponent(i.uploadedFile)}&t=${Date.now()}" onload="this.nextElementSibling.querySelector('.dim').textContent=this.naturalWidth+'x'+this.naturalHeight" onerror="this.style.display='none';this.parentElement.querySelector('.err').style.display='block'"><div class="up-info"><div class="up-name">${i.uploadedFile}</div><div class="up-meta"><span class="dim">—</span> · ham yüklenmiş (işlenmemiş)</div><div class="err" style="display:none;color:#c94d4d;font-size:11px;">Preview yüklenemedi</div></div></div>` : '';
      const deny = i.status === 'denied' && i.denyReason ? `<div class="deny-reason"><b>Reddedildi:</b> ${escapeHtml(i.denyReason)}</div>` : '';
      const actions = [];
      const qn = JSON.stringify(i.name).replace(/"/g, '&quot;');
      if (i.prompt && (i.status === 'todo' || i.status === 'in-progress' || i.status === 'denied')) actions.push(`<button class="btn primary" onclick="copyPrompt(${qn})">Prompt Kopyala</button>`);
      if (i.status === 'todo' || i.status === 'in-progress' || i.status === 'denied') actions.push(`<button class="btn" onclick="uploadFor(${qn})">Upload</button>`);
      if (i.status === 'waiting-for-review') {
        actions.push(`<button class="btn primary" onclick="reviewAction(${qn},'approve')">Onayla</button>`);
        actions.push(`<button class="btn danger" onclick="reviewAction(${qn},'deny')">Reddet</button>`);
        actions.push(`<button class="btn" onclick="deleteUpload(${qn})">Sil</button>`);
      }
      if (i.status === 'approved') {
        actions.push(`<button class="btn primary" onclick="jumpToAsset(${qn})">Assete Git</button>`);
        actions.push(`<button class="btn" onclick="clearEntry(${qn})">Temizle</button>`);
        actions.push(`<button class="btn danger" onclick="reviewAction(${qn},'deny')">Reddet</button>`);
      }
      if (i.status === 'denied') {
        actions.push(`<button class="btn primary" onclick="reviewAction(${qn},'approve')">Onayla</button>`);
        actions.push(`<button class="btn" onclick="reviewAction(${qn},'reopen')">İncelemeye Al</button>`);
        actions.push(`<button class="btn danger" onclick="deleteUpload(${qn})">Sil</button>`);
      }
      if (i.uploadedFile) actions.push(`<a class="btn" href="/api/uploaded?file=${encodeURIComponent(i.uploadedFile)}" download="${i.uploadedFile}">İndir</a>`);
      return `
      <div class="miss" id="miss-${cssEsc(i.name)}">
        <h3>${i.name}</h3>
        <div class="meta">
          <span class="tag pri-${i.priority}">${i.priority}</span>
          <span class="tag st-${i.status}">${i.status}</span>
          <span class="tag">${i.kind}</span>
          <span class="tag" style="background:${i.type==='Animasyon'?'#8b4d1e':'#3a2d1d'}">${i.type}</span>
        </div>
        <div class="notes">${i.notes || ''}</div>
        ${deny}
        ${preview}
        ${i.prompt && (i.status!=='approved') ? `<div class="prompt">${escapeHtml(i.prompt)}</div>` : ''}
        <div class="actions">${actions.join('')}</div>
      </div>`;
    }).join('');
    return;
  }
  const baseItems = (tab === 'review') ? itemsForTab() : data.items;
  const filtered = baseItems.filter(i =>
    (!q || i.name.toLowerCase().includes(q)) &&
    (!filter.cat || i.category === filter.cat) &&
    (!filter.ext || i.ext === filter.ext) &&
    (!filter.kind || i.kind === filter.kind) &&
    (!filter.type || i.type === filter.type) &&
    (filter.sheetOnly ? !!i.isSheet : !i.isSheet)
  );
  if (!filtered.length) { g.innerHTML = '<div class="empty">Eşleşen asset yok.</div>'; return; }
  g.innerHTML = filtered.map(i => {
    const _abs = resolveAbsoluteSrc(i);
    let thumbInner = `<img loading="lazy" src="${_abs}" alt="${i.name}">`;
    // Animation playback: if strip with N frames (dim like "WxH" where W = H*N)
    if (i.type === 'Animasyon' && i.dim) {
      const m = i.dim.match(/^(\d+)x(\d+)$/);
      const nameFrames = ((i.file || i.name).match(/[-_](\d+)f/i) || [])[1];
      if (m) {
        const w = +m[1], h = +m[2];
        const frames = nameFrames ? +nameFrames : (w > h ? Math.round(w / h) : 1);
        if (frames > 1) {
          // Display: keep aspect ratio of a single frame; cap to 128px box.
          const frameW = w / frames;
          const dispH = 128, dispW = Math.min(128, Math.round(frameW * (dispH / h)));
          const endX = -((frames - 1) * dispW);
          const _tileFps = (i.animation && i.animation.fps) ? i.animation.fps : 8;
          const dur = (frames / _tileFps).toFixed(2);
          thumbInner = `<div class="anim-frame" style="width:${dispW}px;height:${dispH}px;background-image:url('${_abs}');background-size:${dispW * frames}px ${dispH}px;--end:${endX}px;animation:sprite-play ${dur}s steps(${frames - 1}) infinite;"></div>`;
        }
      }
    }
    const isFlagged = (review.items || []).some(r => r.file === i.file);
    const flagTag = (tab === 'have' && isFlagged) ? ` <span class="tag" style="background:#c47a18;color:#1a1510;font-weight:600;" title="İnceleme listesinde">İncelemede</span>` : '';
    return `
    <div class="card${i.isSheet ? ' sheet-card' : ''}" data-id="${i.id}">
      <div class="thumb" onclick="openModal('${i.id}')">${i.isSheet ? '<span class="sheet-badge">SHEET</span>' : ''}${thumbInner}<button class="edit-btn" onclick="event.stopPropagation();openEditor('${i.id}')" title="Düzenle">✏️ Düzenle</button></div>
      <div class="info">
        <div class="n">${i.name}</div>
        <div class="d"><span>${i.dim || '—'}</span><span>${fmtSize(i.size)}</span></div>
        <span class="tag">${i.kind}</span> <span class="tag" style="background:${i.type==='Animasyon'?'#8b4d1e':'#3a2d1d'}">${i.type}</span>${flagTag}
        <a class="dl" href="${_abs}" download="${i.file}" onclick="event.stopPropagation()">İndir</a>

function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]); }
function cssEsc(s) { return String(s).replace(/[^a-z0-9_-]/gi, '_'); }

function toast(msg, kind = 'ok', { undoLabel, onUndo, undoMs = 5000 } = {}) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderColor = kind === 'err' ? '#c94d4d' : '#d4a849';
  if (undoLabel && onUndo) {
    t.style.display = 'flex';
    t.style.alignItems = 'center';
    t.style.gap = '10px';
    const span = document.createElement('span');
    span.textContent = msg + ' ';
    t.appendChild(span);
    const btn = document.createElement('button');
    btn.style.cssText = 'background:#d4a849;color:#1a1510;border:none;padding:4px 10px;border-radius:5px;cursor:pointer;font-weight:700;font-family:inherit;font-size:13px;';
    let secsLeft = Math.round(undoMs / 1000);
    btn.textContent = undoLabel + ' (' + secsLeft + ')';
    let done = false;
    const interval = setInterval(() => {
      secsLeft--;
      btn.textContent = secsLeft > 0 ? undoLabel + ' (' + secsLeft + ')' : undoLabel;
      if (secsLeft <= 0) clearInterval(interval);
    }, 1000);
    btn.onclick = (e) => {
      e.stopPropagation();
      if (done) return;
      done = true;
      clearInterval(interval);
      onUndo();
      t.classList.remove('show');
      setTimeout(() => t.remove(), 300);
    };
    t.appendChild(btn);
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, undoMs);
  } else {
    t.textContent = msg;
    document.body.appendChild(t);
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
  }
}

function uploadFor(name) {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = 'image/png,image/webp,image/gif,image/jpeg';
  inp.onchange = async () => {
    const file = inp.files[0]; if (!file) return;
    if (file.size > 20 * 1024 * 1024) return toast('20MB üstü kabul edilmiyor', 'err');
    toast('Yükleniyor…');
    const reader = new FileReader();
    reader.onload = async () => {
      const dataBase64 = String(reader.result).split(',')[1];
      try {
        const r = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, filename: file.name, dataBase64 }),
        });
        const j = await r.json();
        if (!r.ok) throw new Error(j.error || 'upload failed');
        toast('Yüklendi — waiting-for-review');
        setTimeout(load, 800);
      } catch (e) { toast(String(e.message), 'err'); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

  else if (action === 'reopen' && !confirm(`${name} — incelemeye geri alınsın mı?`)) return;
  const prev = missing.items.find(i => i.name === name);
  const prevStatus = prev?.status, prevDenyReason = prev?.denyReason;
  try {
    const r = await fetch('/api/review-flag', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reviewAction: action, name, reason }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'review failed');
    recordAction({ type: 'review', name, prevStatus, prevDenyReason, label: action === 'approve' ? 'onay' : action === 'deny' ? 'red' : 'incele' });
    toast({ approve: 'Onaylandı', deny: 'Reddedildi', reopen: 'İncelemeye alındı' }[action]);

  } catch (e) { toast(String(e.message), 'err'); }
}

async function deleteAsset(file, dir, andUnflag) {
  if (!dir) return toast('Bu asset silinemez (dir yok)', 'err');
  // Find and immediately dim the tile
  const assetId = (data.items || []).find(i => i.file === file)?.id;
  let tileEl = null;
  if (assetId) {
    tileEl = document.querySelector(`.card[data-id="${assetId}"]`);
    if (tileEl) tileEl.style.opacity = '0.3';
  }
  try {
    // DELETE first — toast shown after so restore is always safe
    const r = await fetch('/api/trash', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'asset-delete', file, dir }),
    });
    const j = await r.json();
    if (!r.ok) throw new Error(j.error || 'delete failed');
    recordAction({ type: 'asset-delete', file, label: 'silme' });
    if (andUnflag) {
      await fetch('/api/review-flag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file, remove: true }),
      }).catch(() => {});
    }
    if (tileEl) tileEl.remove();
    refreshTrashTabCount();
    // Toast with undo shown AFTER delete succeeds — file is now in trash
    toast('🗑 Trash\'e taşındı', 'ok', {
      undoLabel: '↺ Geri al',
      undoMs: 5000,
      onUndo: async () => {
        try {
          const r2 = await fetch('/api/trash', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'restore', file }),
          });
          const j2 = await r2.json();
          if (!r2.ok) throw new Error(j2.error);
          toast('Geri alındı');
          refreshTrashTabCount();
          setTimeout(load, 500);
        } catch (e) { toast('Geri alma başarısız: ' + e.message, 'err'); setTimeout(load, 500); }
      },
    });
  } catch (e) {
    if (tileEl) tileEl.style.opacity = '';
    toast(String(e.message), 'err');
  }
}

function recordAction(action) {
  lastAction = { ...action, at: Date.now() };
  updateUndoButton();
}

function updateUndoButton() {
  let el = document.getElementById('undo-btn');
  if (!el) {
    el = document.createElement('button');
    el.id = 'undo-btn';
    el.style.cssText = 'position:fixed;bottom:16px;right:16px;background:#d4a849;color:#1a1510;border:none;padding:10px 18px;border-radius:6px;cursor:pointer;font-weight:600;z-index:200;transition:opacity .2s;box-shadow:0 2px 8px rgba(0,0,0,.4);';
    el.onclick = undoLastAction;
    document.body.appendChild(el);
  }
  const valid = lastAction && (Date.now() - lastAction.at) < 15000;
  if (valid) {
    el.textContent = `⟲ Geri Al (${lastAction.label})`;
    el.style.opacity = '1';
    el.style.cursor = 'pointer';
    el.disabled = false;
  } else {
    el.textContent = '⟲ Geri Al';
    el.style.opacity = '0.4';
    el.style.cursor = 'not-allowed';
    el.disabled = true;
  }
}

setInterval(updateUndoButton, 1000);

async function undoLastAction() {
  if (!lastAction || (Date.now() - lastAction.at) > 15000) return;
  const a = lastAction;
  const token = localStorage.getItem('adminToken') || '';
  try {
    if (a.type === 'asset-delete' || a.type === 'upload-delete') {
      const r = await fetch('/api/trash', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'restore', file: a.file }),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
      // For upload-delete: also restore missing.json status + uploadedFile
      if (a.type === 'upload-delete' && a.itemName) {
        await fetch('/api/missing', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name: a.itemName, patch: { status: a.prevStatus || 'waiting-for-review', uploadedFile: a.file, denyReason: a.prevDenyReason || null } }),
        });
      }
    } else if (a.type === 'review') {
      // Revert to prev status
      const prev = a.prevStatus;
      let action;
      if (prev === 'waiting-for-review') action = 'reopen';
      else if (prev === 'approved') action = 'approve';
      else if (prev === 'denied') action = 'deny';
      else throw new Error('prev status revert not supported: ' + prev);
      const body = { name: a.name, action };
      if (action === 'deny') body.reason = a.prevDenyReason || 'restored by undo';
      const r = await fetch('/api/review-flag', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ reviewAction: body.action, name: body.name, reason: body.reason }),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.error);
    } else if (a.type === 'clear') {
      throw new Error('Clear geri alınamaz — missing listesinden kalıcı silindi');
    } else {
      throw new Error('bilinmeyen action: ' + a.type);
    }
    toast('Geri alındı');
    lastAction = null;
    updateUndoButton();
    setTimeout(load, 800);
  } catch (e) { toast('Undo: ' + e.message, 'err'); }
}

    const visibleFiles = j.files.filter(f => !f.name.endsWith('.meta.json'));

    g.innerHTML = visibleFiles.map(f => `
      <div class="miss">

        <div class="actions">

  let restored = false;
  toast('🗑 Upload silindi', 'ok', {
    undoLabel: '↺ Geri al',
    undoMs: 5000,
    onUndo: async () => {
      restored = true;
      if (tileEl) tileEl.style.opacity = '';
      if (prev?.uploadedFile) {
        try {
          const r = await fetch('/api/trash', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'restore', file: prev.uploadedFile }),
          });
          const j = await r.json();
          if (!r.ok) throw new Error(j.error);
          await fetch('/api/missing', {

function fmtSize(b) {
  if (b < 1024) return b + 'B';

}

function openModal(id) {
  const i = data.items.find(x => x.id === id);
  if (!i) return;
  const _absSrc = resolveAbsoluteSrc(i);
  let previewInner = `<img src="${_absSrc}">`;
  if (i.type === 'Animasyon' && i.dim) {
    const m = i.dim.match(/^(\d+)x(\d+)$/);
    const nameFrames = ((i.file || i.name).match(/[-_](\d+)f/i) || [])[1];
    if (m) {
      const w = +m[1], h = +m[2];
      const frames = nameFrames ? +nameFrames : (w > h ? Math.round(w / h) : 1);
      if (frames > 1) {
        const frameW = w / frames;
        const dispH = 256, dispW = Math.round(frameW * (dispH / h));
        const _previewFps = (i.animation && i.animation.fps) ? i.animation.fps : 8;
        const endX = -((frames - 1) * dispW), dur = (frames / _previewFps).toFixed(2);
        previewInner = `
          <div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
            <div style="font-size:11px;color:#5A3C1E;font-weight:600;">Oyun içi görünüm (${frames} frame @ ${_previewFps} FPS)</div>
            <div style="width:${dispW}px;height:${dispH}px;background-image:url('${_absSrc}');background-repeat:no-repeat;background-size:${dispW * frames}px ${dispH}px;animation:sprite-play ${dur}s steps(${frames-1}) infinite;--end:${endX}px;image-rendering:-webkit-optimize-contrast;"></div>
            <div style="font-size:11px;color:#8b6b3d;">Ham strip:</div>
            <img src="${_absSrc}" style="max-width:100%;">
          </div>`;
      }
    }
  }

  // Compute animation defaults for the ANIMATION section.
  const _nameFrames = ((i.file || i.name).match(/[-_](\d+)f/i) || [])[1];
  const _dimMatch = (i.dim || '').match(/^(\d+)x(\d+)$/);
  const _isAnimType = i.type === 'Animasyon';
  const _isAnim = !!(_isAnimType || i.animation || _nameFrames);
  const _savedAnim = i.animation || {};
  let _defFrames = _savedAnim.frames || (_nameFrames ? +_nameFrames : (_dimMatch && +_dimMatch[1] > +_dimMatch[2] ? Math.round(+_dimMatch[1] / +_dimMatch[2]) : 1));
  const _defFps = _savedAnim.fps || 8;
  const _defLayout = _savedAnim.layout || 'horizontal-strip';

  // Build badge list
  const _badges = [];
  if (i.type === 'Animasyon') _badges.push('<span class="d-badge anim">Animation</span>');

  if (i.category) _badges.push('<span class="d-badge course">' + i.category + '</span>');
  const _isFlaggedModal = (typeof reviewFlags !== 'undefined' && reviewFlags instanceof Set)
    ? reviewFlags.has(i.file) : false;
  if (_isFlaggedModal) _badges.push('<span class="d-badge review">Incelemede</span>');

  document.getElementById('box').innerHTML = `
    <div class="preview">${previewInner}</div>
    <div class="details">
      <div class="details-header"><h2>${i.name}</h2></div>
      ${_badges.length ? '<div class="d-badges">' + _badges.join('') + '</div>' : ''}

      <div class="d-section">
        <div class="d-section-title">Identity</div>

        <div class="row"><span class="k">Tip</span><span class="v">${i.type}</span></div>
        <div class="row"><span class="k">Tur</span><span class="v">${i.kind}</span></div>
        <div class="row"><span class="k">Format</span><span class="v">${i.ext.toUpperCase()}</span></div>
      </div>

let activeEditor = null;
// Resolve a manifest item to its on-disk repo path (e.g. www/assets/sliced/balls/ball-09.png).
// Prefers canonicalPath (already relative to www/), then runtimeDir+file, then strips the
// "./assets/<tag>/" public mirror prefix and reconstructs from config.json sources.
function resolveRepoPath(item) {
  if (!item) return null;
  if (item.canonicalPath) {
    let p = String(item.canonicalPath).replace(/^\/+/, '');
    if (!p.startsWith('www/')) p = 'www/' + p;
    return p;
  }
  if (item.runtimeDir) {
    const dir = String(item.runtimeDir).replace(/^\/+|\/+$/g, '');
    return `${dir}/${item.file}`;
  }
  // Fallback: ./assets/<tag>/<file> -> look up config.sources by tag.
  // We don't have config in client; bail and let the user know.
  return null;
}
function resolveAbsoluteSrc(item) {
  // 1. Local staged/override wins (IndexedDB optimistic cache after publish)
  if (localOverrides.has(item.id)) return localOverrides.get(item.id);
  // 2. Firebase Storage CDN URL if available (set by onSnapshot listener)
  const fbUrl = window._fbManifestOverrides?.[item.id]?.url;
  if (fbUrl) return fbUrl;
  // 3. Supabase Storage CDN URL (baked into manifest at build time)
  if (item.cdnUrl) return item.cdnUrl;
  // 4. Local /assets/ path (build-time copy, dev-server fallback)
  return item.src || '';
}
function openEditor(id) {
  const item = (data.items || []).find(x => x.id === id);
  if (!item) { toast('Asset not found: ' + id, 'err'); return; }
  const repoPath = resolveRepoPath(item);
  const modal = document.getElementById('editor-modal');
  modal.innerHTML = '';
  modal.classList.add('open');
  const host = document.createElement('div');
  host.className = 'editor-host';
  modal.appendChild(host);
  // Detect animation strip to set initial slice mode.
  const _editorNameFrames = ((item.file || item.name).match(/[-_](\d+)f/i) || [])[1];
  const _editorIsAnim = !!(item.type === 'Animasyon' || item.animation || _editorNameFrames);
  const _editorFrameCount = item.animation?.frames || (_editorNameFrames ? +_editorNameFrames : null);

  activeEditor = window.ImageEditor.mount({
    container: host,
    src: resolveAbsoluteSrc(item),
    sourceName: item.name,
    assetName: item.name,
    initialTool: _editorIsAnim ? 'slice' : undefined,
    initialSliceMode: _editorIsAnim ? 'anim' : undefined,
    initialSliceParams: (_editorIsAnim && _editorFrameCount) ? { cols: _editorFrameCount, rows: 1 } : undefined,
    onApply: async (out) => {
      try {
        if (!out || !out.pngBlob) { toast('Editor produced no PNG output.', 'err'); return; }
        // Optimistic local update
        const objectURL = URL.createObjectURL(out.pngBlob);
        const prevLO = localOverrides.get(item.id);
        if (prevLO) URL.revokeObjectURL(prevLO);
        localOverrides.set(item.id, objectURL);
        await idbSaveOverride(item.id, out.pngBlob, null);
        refreshLocalView(item.id, out.pngBlob);
        toast('Publishing...', 'ok');
        const pngBase64 = await blobToBase64(out.pngBlob);
        const res = await fetch('/api/save-edits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assetPath: repoPath, pngBase64 }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.error || res.status);
        }
        toast('Published', 'ok');
        if (window._DEPLOY_HOOK_URL) fetch(window._DEPLOY_HOOK_URL, { method: 'POST' }).catch(() => {});
      } catch (e) {
        toast('Publish failed: ' + (e.message || e), 'err');
      }
    },
    onSliceApply: async (payload) => {
      try {
        if (!payload.stripBlob) { toast('No strip output from slicer.', 'err'); return; }
        const animMeta = {
          frames: payload.frames,
          fps: payload.params?.fps || item.animation?.fps || 8,
          frameW: payload.frameW,
          frameH: payload.frameH,
          layout: 'horizontal-strip',
          customCells: payload.params?._cells || null
        };
        // Optimistic local update
        const objectURL = URL.createObjectURL(payload.stripBlob);
        const prevLO = localOverrides.get(item.id);
        if (prevLO) URL.revokeObjectURL(prevLO);
        localOverrides.set(item.id, objectURL);
        await idbSaveOverride(item.id, payload.stripBlob, animMeta);
        refreshLocalView(item.id, payload.stripBlob, animMeta);
        toast('Publishing...', 'ok');
        const pngBase64 = await blobToBase64(payload.stripBlob);
        const res = await fetch('/api/save-edits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assetPath: repoPath, pngBase64 }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.error || res.status);
        }
        await fetch('/api/save-edits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assetId: item.id, animation: animMeta }),
        }).catch(() => {});
        toast('Published', 'ok');
        if (window._DEPLOY_HOOK_URL) fetch(window._DEPLOY_HOOK_URL, { method: 'POST' }).catch(() => {});
      } catch (e) {
        toast('Publish failed: ' + (e.message || e), 'err');
      }
    },
    onCancel: () => closeEditor()
  });
}

// Opens the SOURCE SHEET in image-editor with this asset's saved crop bbox pre-loaded.
// User drag/resizes the bbox and Apply -> re-crops the asset PNG + persists sourceBbox.
async function openEditorFromSheet(id) {
  const item = (data.items || []).find(x => x.id === id);
  if (!item) { toast('Asset not found: ' + id, 'err'); return; }
  if (!item.sourceSheet) { toast('No sourceSheet for: ' + id, 'err'); return; }

  // Proxy the source sheet to avoid canvas CORS taint
  const sheetRelPath = item.sourceSheet;
  const gameOrigin = 'https://golf-paper-craft.vercel.app';
  const rawSheetUrl = gameOrigin + '/' + sheetRelPath;
  const proxiedSheetUrl = '/api/proxy-image?url=' + encodeURIComponent(rawSheetUrl);

  const savedBbox = sourceBboxStore[id] || null;
  const repoPath = resolveRepoPath(item);

  const modal = document.getElementById('editor-modal');
  modal.innerHTML = '';
  modal.classList.add('open');
  const host = document.createElement('div');
  host.className = 'editor-host';
  modal.appendChild(host);

  activeEditor = window.ImageEditor.mount({
    container: host,
    src: proxiedSheetUrl,
    sourceName: sheetRelPath.split('/').pop(),
    assetName: item.name,
    initialTool: 'crop',
    edits: savedBbox ? { crop: { x: savedBbox.x, y: savedBbox.y, w: savedBbox.w, h: savedBbox.h } } : {},
    onApply: async (out) => {
      try {
        if (!out || !out.pngBlob) { toast('No PNG output from editor.', 'err'); return; }
        const bbox = (out.edits && out.edits.crop && out.edits.crop.w > 0)
          ? { x: Math.round(out.edits.crop.x), y: Math.round(out.edits.crop.y), w: Math.round(out.edits.crop.w), h: Math.round(out.edits.crop.h) }
          : { x: 0, y: 0, w: out.width, h: out.height };
        // Optimistic local update
        const objectURL = URL.createObjectURL(out.pngBlob);
        const prevLO = localOverrides.get(item.id);
        if (prevLO) URL.revokeObjectURL(prevLO);
        localOverrides.set(item.id, objectURL);
        await idbSaveOverride(item.id, out.pngBlob, null);
        refreshLocalView(item.id, out.pngBlob);
        toast('Publishing re-cropped asset...', 'ok');
        const pngBase64 = await blobToBase64(out.pngBlob);
        const res = await fetch('/api/save-source-bbox', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ assetId: item.id, assetPath: repoPath, bbox, pngBase64 }),
        });
        if (!res.ok) {
          const j = await res.json().catch(() => ({}));
          throw new Error(j.error || res.status);
        }
        sourceBboxStore[item.id] = bbox;
        toast('Published + bbox saved', 'ok');
        if (window._DEPLOY_HOOK_URL) fetch(window._DEPLOY_HOOK_URL, { method: 'POST' }).catch(() => {});
      } catch (e) {
        toast('Publish failed: ' + (e.message || e), 'err');
      }
    },
    onCancel: () => closeEditor()
  });
}

function refreshLocalView(assetId, blob, animMeta) {
  // Revoke old objectURL if any
  const prev = localOverrides.get(assetId);
  if (prev) URL.revokeObjectURL(prev);
  const url = URL.createObjectURL(blob);
  localOverrides.set(assetId, url);
  // Patch in-memory item so next openEditor uses new frame count
  const memItem = (typeof data !== 'undefined' && data.items)
    ? data.items.find(x => x.id === assetId) : null;
  if (memItem && animMeta) memItem.animation = { ...(memItem.animation || {}), ...animMeta };
  // Recompute anim display params if animMeta provided
  const frames = animMeta?.frames || 1;
  const frameW = animMeta?.frameW || null;
  // Update card thumbnail
  const card = document.querySelector(`.card[data-id="${assetId}"]`);
  if (card) {
    const img = card.querySelector('.thumb img');
    if (img) img.src = url;
    const anim = card.querySelector('.anim-frame');
    if (anim) {
      anim.style.backgroundImage = `url('${url}')`;
      if (frames > 1 && frameW) {
        const dispH = 128;
        const dispW = Math.round(frameW * (dispH / (animMeta.frameH || frameW)));
        const endX = -((frames - 1) * dispW);
        const dur = (frames / (animMeta.fps || 8)).toFixed(2);
        anim.style.width = dispW + 'px';
        anim.style.height = dispH + 'px';
        anim.style.backgroundSize = `${dispW * frames}px ${dispH}px`;
        anim.style.setProperty('--end', endX + 'px');
        anim.style.animationDuration = dur + 's';
        anim.style.animationTimingFunction = `steps(${frames - 1})`;
      }
    }
  }
  // Update modal preview if open for this asset
  const modalBox = document.getElementById('box');
  if (modalBox && document.getElementById('modal').classList.contains('open')) {
    const mimg = modalBox.querySelector('.preview img');
    if (mimg) mimg.src = url;
    const manim = modalBox.querySelector('[style*="background-image"]');
    if (manim) manim.style.backgroundImage = `url('${url}')`;
  }
}

function pickAnimName(defaultName) {
  const v = prompt('Animation name? (file will be saved as <name>-<frames>f.png)', defaultName);
  if (!v) return null;
  // Sanitize: lowercase, dash-separated, alphanumeric + dash/underscore
  const cleaned = String(v).trim().toLowerCase().replace(/[^a-z0-9_-]+/g, '-').replace(/^-+|-+$/g, '');
  return cleaned || null;
}

async function blobToBase64(blob) {
  const buf = await blob.arrayBuffer();
  const u8 = new Uint8Array(buf);
  const CHUNK = 0x8000;
  let bin = '';
  for (let i = 0; i < u8.length; i += CHUNK) {
    bin += String.fromCharCode.apply(null, u8.subarray(i, i + CHUNK));
  }
  return btoa(bin);
}

function openVideoEditor(file) {
  if (!window.ImageEditor || typeof window.ImageEditor.mountVideoToStrip !== 'function') {
    toast('Video → Strip: coming soon (image-editor API not yet shipped)', 'err');

  const sizeMB = file.size / (1024 * 1024);
  if (sizeMB > 100) {
    toast(`Large video: ${sizeMB.toFixed(1)}MB — processing may be slow`, 'err');
  }
  const defaultName = `anim-${Date.now()}`;
  const userName = pickAnimName(defaultName);
  if (!userName) return;

  activeVideoObjectURL = URL.createObjectURL(file);
  const modal = document.getElementById('editor-modal');
  modal.innerHTML = '';
  modal.classList.add('open');
  const host = document.createElement('div');
  host.className = 'editor-host';
  modal.appendChild(host);

  try {
    activeVideoEditor = window.ImageEditor.mountVideoToStrip({
      container: host,
      videoSrc: activeVideoObjectURL,
      onApply: async (out) => {
        try {
          if (!out || !out.stripBlob) {
            toast('Video editor produced no strip output.', 'err');
            return;
          }
          const frames = out.frames || 1;
          const fileName = `${userName}-${frames}f.png`;
          const targetPath = `www/assets/sliced/uploads/${fileName}`;
          const pngBase64 = await blobToBase64(out.stripBlob);
          toast('Saving strip to GitHub...', 'ok');
          const res = await fetch('/api/save-edits', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ assetPath: targetPath, pngBase64 }),
          });
          const j = await res.json().catch(() => ({}));
          if (!res.ok) {
            toast('Save failed: ' + (j.error || res.status), 'err');
            return;
          }
          toast(`Saved ${fileName} (${frames} frames). Manifest will refresh.`, 'ok');
          closeVideoEditor();
        } catch (e) {
          toast('Save error: ' + (e.message || e), 'err');
        }
      },
      onCancel: () => closeVideoEditor(),
    });
  } catch (e) {
    toast('Failed to mount video editor: ' + (e.message || e), 'err');
    closeVideoEditor();
  }
}

document.getElementById('upload-video-btn').addEventListener('click', () => {
  document.getElementById('upload-video-input').click();
});
document.getElementById('upload-video-input').addEventListener('change', (e) => {
  const file = e.target.files && e.target.files[0];
  e.target.value = ''; // allow re-selecting same file
  if (!file) return;
  openVideoEditor(file);
});

load();
</script>
</body>
</html>
